name: Email Agent

# Runs the email agent on a schedule. Times are UTC.
# Default: once a day at 02:30 UTC.
on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch: {}   # allows manual runs from the Actions tab
  push:
    branches: [main]      # TEMP: trigger a verification run on push

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      LLM_MODEL: llama3.2:3b
      OLLAMA_BASE_URL: http://localhost:11434
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install and start Ollama (open-source, self-hosted in the runner)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          # wait for the server to come up
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
          ollama pull "$LLM_MODEL"

      - name: Diagnose secret integrity (no secret values printed)
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import os
          e = os.environ.get("EMAIL_ADDRESS", "")
          p = os.environ.get("APP_PASSWORD", "")
          print("EMAIL len:", len(e), "| stripped len:", len(e.strip()),
                "| endswith @gmail.com:", e.strip().endswith("@gmail.com"),
                "| has space:", (" " in e))
          pp = p.strip().replace(" ", "")
          print("PASS raw len:", len(p), "| cleaned len:", len(pp),
                "| cleaned is 16 lower-alpha:", (len(pp) == 16 and pp.isalpha() and pp.islower()))
          EOF

      - name: Run email agent
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python agent.py
