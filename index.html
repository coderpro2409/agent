<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Email Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0b0d12; --bg2:#0f1218; --card:#151922; --card2:#1a1f2b;
    --line:#262d3a; --line2:#323b4d; --fg:#eef1f6; --muted:#8b93a5;
    --accent:#6d8eff; --accent2:#a86bff; --good:#3ad29f; --bad:#ff7b8a; --warn:#ffb86b;
    --grad:linear-gradient(135deg,#6d8eff 0%,#a86bff 100%);
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--fg); background:
      radial-gradient(900px 600px at 12% -8%, rgba(109,142,255,.16), transparent 60%),
      radial-gradient(800px 600px at 100% 0%, rgba(168,107,255,.13), transparent 55%),
      var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:900px; margin:0 auto; padding:48px 22px 90px; }
  .brand { display:flex; align-items:center; gap:12px; margin-bottom:30px; }
  .logo {
    width:42px; height:42px; border-radius:12px; background:var(--grad);
    display:grid; place-items:center; box-shadow:0 8px 24px rgba(109,142,255,.35);
  }
  .logo svg { width:22px; height:22px; stroke:#fff; }
  .brand .name { font-weight:600; font-size:15px; letter-spacing:.02em; }
  .brand .name span { color:var(--muted); font-weight:400; }
  h1 { font-size:34px; line-height:1.1; margin:0 0 10px; letter-spacing:-.02em; font-weight:700; }
  h1 em { font-style:normal; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  p.sub { color:var(--muted); margin:0 0 30px; max-width:600px; font-size:15px; }
  .card {
    background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line); border-radius:18px; padding:20px;
    margin-bottom:16px; box-shadow:0 14px 40px rgba(0,0,0,.35);
  }
  .controls .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
  input { background:var(--bg2); border:1px solid var(--line2); color:var(--fg); border-radius:10px;
          padding:10px 12px; font:inherit; font-size:14px; transition:.15s; }
  input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(109,142,255,.18); }
  input#email { width:260px; }
  input#appPassword { width:220px; }
  input#date { width:170px; }
  .btn {
    background:var(--grad); color:#fff; border:0; border-radius:11px; padding:11px 22px;
    font:inherit; font-weight:600; font-size:14.5px; cursor:pointer; transition:.15s;
    box-shadow:0 8px 22px rgba(109,142,255,.32); align-self:flex-end;
  }
  .btn:hover:not(:disabled){ transform:translateY(-1px); box-shadow:0 12px 28px rgba(109,142,255,.42); }
  .btn:disabled { opacity:.45; cursor:default; box-shadow:none; }
  #status { color:var(--muted); font-size:13.5px; margin-top:14px; min-height:20px; display:flex; align-items:center; gap:8px; }
  .spin { width:14px; height:14px; border:2px solid var(--line2); border-top-color:var(--accent); border-radius:50%; animation:sp .7s linear infinite; display:none; }
  @keyframes sp { to { transform:rotate(360deg); } }
  .summary-strip { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 16px; }
  .stat b { font-size:20px; font-weight:700; display:block; }
  .stat span { font-size:12px; color:var(--muted); }
  .email-card {
    background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin-bottom:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.3); position:relative; overflow:hidden;
  }
  .email-card::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--grad); }
  .ec-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .ec-head h3 { margin:0; font-size:16px; font-weight:600; line-height:1.35; }
  .meta { color:var(--muted); font-size:13px; margin:6px 0 0; }
  .meta b { color:var(--fg); font-weight:500; }
  .tag { display:inline-block; border-radius:999px; padding:3px 11px; font-size:11.5px; font-weight:600;
         white-space:nowrap; background:rgba(109,142,255,.15); color:#9cb4ff; border:1px solid rgba(109,142,255,.3); }
  .tag.Payments { background:rgba(58,210,159,.14); color:#7fe6c2; border-color:rgba(58,210,159,.3); }
  .tag.Internship,.tag.Work { background:rgba(168,107,255,.16); color:#cba8ff; border-color:rgba(168,107,255,.32); }
  .tag.Marketing { background:rgba(255,184,107,.14); color:#ffcf96; border-color:rgba(255,184,107,.3); }
  .reply { display:inline-flex; align-items:center; gap:5px; font-size:12px; margin-left:10px; }
  .reply.yes { color:var(--warn); } .reply.no { color:var(--muted); }
  .lbl { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.07em; font-weight:600; margin:16px 0 7px; }
  pre { white-space:pre-wrap; background:var(--bg2); border:1px solid var(--line2); border-radius:10px;
        padding:13px 15px; font:13px/1.65 "JetBrains Mono",ui-monospace,Menlo,monospace; margin:0; color:#d6dbe6; }
  .empty { color:var(--muted); text-align:center; padding:40px; }
  footer { color:var(--muted); font-size:13px; text-align:center; margin-top:34px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
    </div>
    <div class="name">Inbox Agent <span>· triage &amp; draft</span></div>
  </div>

  <h1>Your inbox, <em>read and replied</em>.</h1>
  <p class="sub">Pulls a day's worth of Gmail, sorts each message by intent, writes a quick summary, and drafts a reply where one is needed, so you can clear the day in a single scroll.</p>

  <div class="card controls">
    <div class="row">
      <div class="field">
        <label for="email">Gmail address</label>
        <input type="email" id="email" autocomplete="username" placeholder="you@gmail.com" />
      </div>
      <div class="field">
        <label for="appPassword">App password</label>
        <input type="password" id="appPassword" autocomplete="off" placeholder="16-character password" />
      </div>
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date" />
      </div>
      <button class="btn" id="run">Fetch emails</button>
    </div>
    <div id="status"><span class="spin" id="spin"></span><span id="statustext"></span></div>
  </div>

  <div id="strip" class="summary-strip"></div>
  <div id="results"></div>
  <footer>Inbox view.</footer>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  $("date").value = new Date().toISOString().slice(0,10);

  function esc(s){ return (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function setStatus(t){ $("statustext").textContent = t; }
  function loading(on){ $("spin").style.display = on ? "inline-block" : "none"; }

  $("run").addEventListener("click", async () => {
    const email = $("email").value.trim();
    const appPassword = $("appPassword").value.trim();
    const date = $("date").value;
    if(!email){ setStatus("Enter your Gmail address."); return; }
    if(!appPassword){ setStatus("Enter your Gmail app password."); return; }
    $("run").disabled = true; loading(true); setStatus("Connecting to inbox…");
    $("results").innerHTML = ""; $("strip").innerHTML = "";
    try {
      const r = await fetch("/api/inbox", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, appPassword, date }),
      });
      const data = await r.json();
      if(!r.ok){ setStatus(data.error || ("Error " + r.status)); return; }

      const needReply = (data.emails || []).filter(e => e.needsReply).length;
      setStatus(`${data.count} email(s) on ${data.date}`);
      $("strip").innerHTML = `
        <div class="stat"><b>${data.count}</b><span>messages</span></div>
        <div class="stat"><b>${needReply}</b><span>need a reply</span></div>
        <div class="stat"><b>${esc(data.llm)}</b><span>summaries</span></div>`;

      $("results").innerHTML = (data.emails || []).map(e => `
        <div class="email-card">
          <div class="ec-head">
            <h3>${esc(e.subject)}</h3>
            <span class="tag ${esc(e.category)}">${esc(e.category)}</span>
          </div>
          <div class="meta">From <b>${esc(e.sender)}</b>
            <span class="reply ${e.needsReply ? "yes" : "no"}">${e.needsReply ? "● reply needed" : "○ no reply needed"}</span>
          </div>
          <div class="lbl">Summary</div><pre>${esc(e.summary)}</pre>
          ${e.draft && e.draft !== "Not required" ? `<div class="lbl">Draft reply</div><pre>${esc(e.draft)}</pre>` : ""}
        </div>`).join("") || `<div class="card empty">No emails found for ${esc(data.date)}.</div>`;
    } catch(err){
      setStatus("Request failed: " + (err.message || err));
    } finally {
      $("run").disabled = false; loading(false);
    }
  });
</script>
</body>
</html>
